<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>
  <h2>Login</h2>
  <form action="/login" method="post">

    <label>Email</label>
    <input type="email" name="username" required>

    <br>

    <label>Password</label>
    <input type="password" name="password" required>

    <br>

    <button type="submit">Login</button>

</form>

  <a href="/register">Create Account </a>

</body>
</html>
