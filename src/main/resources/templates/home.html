<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Home Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

<div class="max-w-2xl mx-auto p-4 space-y-6">

    <header class="flex justify-between items-center py-4 border-b border-gray-200">
        <h1 class="text-2xl font-bold text-blue-600">SocialFeed</h1>
        <a th:href="@{/logout}" class="text-sm font-medium text-red-500 hover:underline">Logout</a>
    </header>

    <div th:replace="~{fragments/post-form :: create-post-card}"></div>

    <main class="space-y-4">
        <h2 class="text-lg font-semibold text-gray-700">Your Feed</h2>

        <div th:each="post : ${posts}">
            <div th:replace="~{fragments/post-card :: post-card(post=${post})}"></div>
        </div>

        <div th:if="${#lists.isEmpty(posts)}" class="text-center py-8 text-gray-500">
            No posts to show yet. Add some friends to see their updates!
        </div>
    </main>

</div>

<script th:inline="javascript">
    function toggleLike(postId) {
        const likeBtn = document.getElementById(`like-btn-${postId}`);
        const likeCountSpan = document.getElementById(`like-count-${postId}`);

        fetch(`/api/posts/${postId}/like`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response failure');
            }
            return response.json();
        })
        .then(data => {
            // Update UI element attributes dynamically without full reload
            likeCountSpan.textContent = data.newLikeCount;

            if (data.liked) {
                likeBtn.classList.add('text-blue-600', 'font-medium');
                likeBtn.classList.remove('hover:text-blue-600');
            } else {
                likeBtn.classList.remove('text-blue-600', 'font-medium');
                likeBtn.classList.add('hover:text-blue-600');
            }
        })
        .catch(error => {
            console.error('Error handling like operation:', error);
            alert('Could not update like status. Please try again.');
        });
    }
</script>
</body>
</html>
