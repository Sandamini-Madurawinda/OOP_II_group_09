<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{layout :: layout(~{::content})}">
<head></head>
<body>

<th:block th:fragment="content">

    <!-- Post Form -->
    <div th:replace="~{fragments/post-form :: create-post-card}"></div>

    <!-- Feed -->
    <div>
        <p class="feed-label">Recent Updates</p>

        <div th:if="${#lists.isEmpty(posts)}" class="empty-state">
            <p>No posts yet. Be the first to share!</p>
        </div>

        <div th:each="post : ${posts}">
            <div th:replace="~{fragments/post-card :: post-card(post=${post})}"></div>
        </div>
    </div>

    <!-- Like Script -->
    <script th:inline="javascript">
        function toggleLike(postId) {
            const likeBtn = document.getElementById(`like-btn-${postId}`);
            const likeCountSpan = document.getElementById(`like-count-${postId}`);

            fetch(`/api/posts/${postId}/like`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
                if (!response.ok) throw new Error('Network failure');
                return response.json();
            })
            .then(data => {
                likeCountSpan.textContent = data.newLikeCount;
                if (data.liked) {
                    likeBtn.classList.add('liked');
                } else {
                    likeBtn.classList.remove('liked');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Could not update like. Try again.');
            });
        }
    </script>

</th:block>

</body>
</html>
