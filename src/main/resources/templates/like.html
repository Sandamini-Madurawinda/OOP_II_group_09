<!DOCTYPE html>
  <html lang="en" xmlns:th="http://www.thymeleaf.org">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Like System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

      body {
          background-color: #f4f6f9;
      }

      .feed-container {
          max-width: 700px;
          margin: auto;
          margin-top: 40px;
      }

      .post-card {
          background: white;
          padding: 20px;
          border-radius: 12px;
          margin-bottom: 20px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      }

      .post-author {
          font-weight: bold;
          font-size: 18px;
      }

      .post-time {
          font-size: 13px;
          color: gray;
      }

      .post-content {
          margin-top: 15px;
          margin-bottom: 15px;
      }

      .like-section {
          display: flex;
          align-items: center;
          gap: 12px;
      }

      .like-btn {
          transition: 0.2s;
      }

    </style>

  </head>

  <body>

  <div class="container feed-container">

    <h2 class="mb-4">Home Feed</h2>

    <!-- POSTS -->
    <div th:each="post : ${posts}"
         class="post-card"
         th:attr="data-post-id=${post.id}">

      <!-- AUTHOR -->
      <div class="post-author"
           th:text="${post.author.firstName + ' ' + post.author.lastName}">
        John Doe
      </div>

      <!-- TIME -->
      <div class="post-time"
           th:text="${post.createdAt}">
        2026-06-27
      </div>

      <!-- CONTENT -->
      <div class="post-content"
           th:text="${post.content}">
        Hello world
      </div>

      <!-- LIKE SECTION -->
      <div class="like-section">

        <button class="like-btn btn btn-outline-primary">
          🤍 Like
        </button>

        <span class="like-count"
              th:text="${post.likeCount}">
                0
            </span>

      </div>

    </div>

  </div>

  <script src="/js/like.js"></script>

  </body>
  </html>
