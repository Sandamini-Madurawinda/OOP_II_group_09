<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Feed</title>

  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background-color: #f4f6f9; }
    .feed-container { max-width: 700px; margin: auto; margin-top: 40px; }
    .post-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .post-author { font-weight: bold; font-size: 18px; }
    .post-time { font-size: 13px; color: gray; }
    .post-content { margin-top: 15px; margin-bottom: 15px; font-size: 16px; }
    .like-section { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
    .comment-box { margin-top: 20px; }
    .comment-item { background-color: #f8f9fa; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
    .comment-user { font-weight: bold; font-size: 14px; }
  </style>
</head>
<body>

<div class="container feed-container">
  <h2 class="mb-4">Home Feed</h2>

  <div th:each="post : ${posts}" class="post-card" th:attr="data-post-id=${post.id}">

    <div class="post-author" th:text="${post.authorFirstName + ' ' + post.authorLastName}">John Doe</div>
    <div class="post-time" th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}">2026-06-27</div>

    <div class="post-content" th:text="${post.content}">Hello world</div>

    <div class="like-section mb-3">
      <button class="btn action-btn like-btn btn-outline-primary" data-type="like">
        🤍 Like (<span class="like-count">0</span>)
      </button>

      <button class="btn action-btn dislike-btn btn-outline-danger" data-type="dislike">
        👎 Dislike (<span class="dislike-count">0</span>)
      </button>
    </div>

    <div class="comment-box">
      <form th:action="@{/comments/add/{postId}(postId=${post.id})}" method="post">
        <div class="input-group">
          <input type="text" name="content" class="form-control" placeholder="Write a comment..." required>
          <button type="submit" class="btn btn-secondary">Comment</button>
        </div>
      </form>
    </div>

    <div class="mt-3">
      <div th:if="${post.comments != null}">
        <div th:each="comment : ${post.comments}" class="comment-item">
          <div class="comment-user" th:text="${comment.user != null ? comment.user.firstName + ' ' + comment.user.lastName : 'User'}">User Name</div>
          <p class="mb-0" th:text="${comment.content}">Nice post!</p>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  document.querySelectorAll(".action-btn").forEach(button => {
      button.addEventListener("click", async function () {
          const postCard = this.closest(".post-card");
          const postId = postCard.dataset.postId;
          const isDislikeAction = this.dataset.type === "dislike";

          const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
          const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

          try {
              const likeBtn = postCard.querySelector(".like-btn");
              const dislikeBtn = postCard.querySelector(".dislike-btn");
              likeBtn.disabled = true;
              dislikeBtn.disabled = true;

              // නිවැරදි කරන ලද URL එක
              const response = await fetch(`/posts/${postId}/like?isDislike=${isDislikeAction}`, {
                  method: "POST",
                  headers: { [header]: token }
              });

              if (!response.ok) throw new Error("Failed");
              const data = await response.json();

              postCard.querySelector(".like-count").innerText = data.likeCount;
              postCard.querySelector(".dislike-count").innerText = data.dislikeCount;

              if (data.liked) {
                  likeBtn.innerHTML = `❤️ Liked (<span class="like-count">${data.likeCount}</span>)`;
                  likeBtn.className = "btn action-btn like-btn btn-primary";
              } else {
                  likeBtn.innerHTML = `🤍 Like (<span class="like-count">${data.likeCount}</span>)`;
                  likeBtn.className = "btn action-btn like-btn btn-outline-primary";
              }

              if (data.disliked) {
                  dislikeBtn.innerHTML = `👎 Disliked (<span class="dislike-count">${data.dislikeCount}</span>)`;
                  dislikeBtn.className = "btn action-btn dislike-btn btn-danger";
              } else {
                  dislikeBtn.innerHTML = `👎 Dislike (<span class="dislike-count">${data.dislikeCount}</span>)`;
                  dislikeBtn.className = "btn action-btn dislike-btn btn-outline-danger";
              }

          } catch (error) {
              console.error("Error:", error);
          } finally {
              postCard.querySelector(".like-btn").disabled = false;
              postCard.querySelector(".dislike-btn").disabled = false;
          }
      });
  });
</script>

</body>
</html>
