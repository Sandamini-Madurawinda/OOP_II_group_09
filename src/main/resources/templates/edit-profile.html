<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="container">
<h2>Edit Profile</h2>

<form th:action="@{/profile/edit}" method="post">

    <label for="firstName">First Name</label>
    <input type="text" id="firstName" name="firstName" th:value="${user.firstName}" required />

    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" name="lastName" th:value="${user.lastName}" required />

    <label for="bio">Bio</label>
    <textarea id="bio" name="bio" th:text="${user.bio}" placeholder="Write something about yourself..."></textarea>

    <button type="submit">Save Changes</button>
    <a href="/profile" style="margin-top: 10px;">Cancel</a>

</form>
</div>

<br>


</body>
</html>
