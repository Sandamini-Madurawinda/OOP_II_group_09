<div xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="create-post-card" class="post-card-container">
        <form th:action="@{/posts/create}" th:object="${postForm}" method="POST">
            <div class="form-body-wrapper">
                <div class="user-avatar-placeholder">
                    <span th:text="${#strings.substring(postForm != null ? '__' : 'U', 0, 1)}">U</span>
                </div>
                <div class="input-area-wrapper">
                    <textarea
                            th:field="*{content}"
                            rows="3"
                            class="post-textarea"
                            placeholder="What's on your mind?..."
                            required></textarea>
                </div>
            </div>

            <hr class="divider-line">

            <div class="form-footer-wrapper">
                <span class="format-indicator">Text only</span>
                <button type="submit" class="submit-post-btn">
                    Post
                </button>
            </div>
        </form>
    </div>
</div>
