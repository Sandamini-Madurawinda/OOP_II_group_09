<div xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="create-post-card" class="post-form-card">
        <form th:action="@{/posts/create}" th:object="${postForm}" method="POST">

            <div class="post-form-row">

                <div class="post-form-avatar">
                    <span th:text="${currentUser != null} ?
                        ${#strings.substring(currentUser.firstName, 0, 1)} : 'U'">U</span>
                </div>

                <div class="post-form-input-wrap">
                    <textarea th:field="*{content}"
                              rows="3"
                              class="post-form-textarea"
                              placeholder="What's on your mind?..."
                              required></textarea>
                </div>

            </div>

            <p th:if="${#fields.hasErrors('content')}"
               th:errors="*{content}"
               class="post-form-error"></p>

            <div class="post-form-footer">

                <div class="post-form-label">
                    <svg xmlns="http://www.w3.org/2000/svg"
                         class="post-form-icon"
                         fill="none"
                         viewBox="0 0 24 24"
                         stroke="currentColor"
                         stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002
                                 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0
                                 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    <span>Text only</span>
                </div>

                <button type="submit" class="post-form-btn" aria-label="Post">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M3.105 2.289a.75.75 0 00-.826.95l1.414 4.925A1.5 1.5 0 005.135 9.25h6.115a.75.75 0 010 1.5H5.135a1.5 1.5 0 00-1.442 1.086l-1.414 4.926a.75.75 0 00.826.95 28.897 28.897 0 0015.293-7.154.75.75 0 000-1.115A28.897 28.897 0 003.105 2.289z" />
                    </svg>
                </button>

            </div>

        </form>
    </div>
</div>
