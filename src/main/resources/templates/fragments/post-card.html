<div xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="post-card(post)" th:id="'post-card-' + ${post.id}" class="bg-white border border-gray-200 rounded-xl p-5 shadow-sm space-y-3">

        <!-- Card Header User Strip -->
        <div class="flex items-center space-x-4">
            <!-- Dynamic Avatar Initial: Falls back to author strings cleanly -->
            <div class="w-10 h-10 rounded-full bg-[#eaf2fc] border border-[#d0e2f9] flex items-center justify-center font-bold text-pulseBlue shrink-0 text-sm">
                <span th:text="${post.user != null} ? ${#strings.substring(post.user.firstName, 0, 1)} : (${post.authorFirstName != null && !post.authorFirstName.isEmpty()} ? ${#strings.substring(post.authorFirstName, 0, 1)} : 'U')">N</span>
            </div>

            <div class="flex flex-col">
                <!-- Actual Profile Name Display: Robust multi-tier check -->
                <h4 class="text-sm font-semibold text-slate-800 leading-tight"
                    th:text="${post.user != null} ? (${post.user.firstName} + ' ' + ${post.user.lastName}) : (${post.authorFirstName != null} ? (${post.authorFirstName} + ' ' + ${post.authorLastName}) : 'Anonymous User')">
                    Nadara Jayasinghe
                </h4>
                <p class="text-[11px] text-slate-400 mt-0.5" th:text="${post.createdAt != null} ? ${#temporals.format(post.createdAt, 'dd MMM yyyy, HH:mm')} : 'Just now'">Just now</p>
            </div>
        </div>

        <!-- Rendered Text Content Row Field -->
        <div class="pl-14 text-sm text-slate-700 leading-relaxed break-words" th:text="${post.content}">
            Fallback placeholder content string.
        </div>

        <!-- Interaction Metrics Bar Layer -->
        <div class="pl-14 pt-2 flex items-center">
            <button type="button"
                    th:onclick="'toggleLike(' + ${post.id} + ')'"
                    th:id="'like-btn-' + ${post.id}"
                    class="flex items-center space-x-2 text-xs font-semibold group transition-colors duration-150"
                    th:classappend="${post.isLikedByCurrentUser} ? 'text-pulseBlue' : 'text-slate-500 hover:text-pulseBlue'">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:scale-110" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.106-1.79l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.4 10.333z" />
                </svg>

                <span th:id="'like-count-' + ${post.id}" th:text="${post.likeCount != null ? post.likeCount : 0}">0</span>
            </button>
        </div>

    </div>
</div>
