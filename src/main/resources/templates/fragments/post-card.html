<div xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="post-card(post)"
         th:id="'post-card-' + ${post.id}"
         class="post-card">

        <div class="post-header">

            <div class="post-avatar">
                <span th:text="${post.user != null} ?
                    ${#strings.substring(post.user.firstName, 0, 1)} :
                    (${post.authorFirstName != null && !post.authorFirstName.isEmpty()} ?
                    ${#strings.substring(post.authorFirstName, 0, 1)} : 'U')">U</span>
            </div>

            <div class="post-meta">
                <h4 class="post-author"
                    th:text="${post.user != null} ?
                        (${post.user.firstName} + ' ' + ${post.user.lastName}) :
                        (${post.authorFirstName != null} ?
                        (${post.authorFirstName} + ' ' + ${post.authorLastName}) :
                        'Anonymous User')">
                    Author Name
                </h4>
                <p class="post-timestamp"
                   th:text="${post.createdAt != null} ?
                       ${#temporals.format(post.createdAt, 'dd MMM yyyy, HH:mm')} :
                       'Just now'">
                    Just now
                </p>
            </div>

        </div>

        <div class="post-content" th:text="${post.content}">
            Post content goes here.
        </div>

        <!-- Interaction Metrics Bar Layer -->
        <div class="pl-14 pt-2 flex items-center space-x-4">

            <!-- Like Button -->
            <button type="button"
                    th:onclick="'toggleLike(' + ${post.id} + ')'"
                    th:id="'like-btn-' + ${post.id}"
                    class="flex items-center space-x-1 text-xs font-semibold group transition-colors duration-150"
                    th:classappend="${post.isLikedByCurrentUser} ? 'text-pulseBlue' : 'text-slate-500 hover:text-pulseBlue'">

                <svg xmlns="http://www.w3.org/2000/svg"
                     class="like-icon"
                     viewBox="0 0 20 20"
                     fill="currentColor">
                    <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6
                             10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0
                             008.943 18h5.416a2 2 0 001.106-1.79l1.2-6A2 2 0
                             0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1
                             1v.667a4 4 0 01-.8 2.4L6.4 10.333z" />
                </svg>
                <span th:id="'like-count-' + ${post.id}" th:text="${post.likeCount != null ? post.likeCount : 0}">0</span>
            </button>

            <!-- Dislike Button -->
            <button type="button"
                    th:onclick="'toggleDislike(' + ${post.id} + ')'"
                    th:id="'dislike-btn-' + ${post.id}"
                    class="flex items-center space-x-1 text-xs font-semibold group transition-colors duration-150 text-slate-500 hover:text-red-500">

                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:scale-110" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M18 9.5a1.5 1.5 0 11-3 0v-6a1.5 1.5 0 013 0v6zM14 9.667v-5.43a2 2 0 00-1.105-1.79l-.05-.025A4 4 0 0011.055 2H5.64a2 2 0 00-1.962 1.608l-1.2 6A2 2 0 004.44 12H8v4a2 2 0 002 2 1 1 0 001-1v-.667a4 4 0 01.8-2.4l1.8-2.4z" />
                </svg>
                <span th:id="'dislike-count-' + ${post.id}" th:text="0">0</span>
            </button>

            <!-- Comment Toggle Button -->
            <button type="button"
                    th:onclick="'toggleComments(' + ${post.id} + ')'"
                    class="flex items-center space-x-1 text-xs font-semibold group transition-colors duration-150 text-slate-500 hover:text-pulseBlue ml-auto">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform group-hover:scale-110" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10c0 3.866-3.582 7-8 7a8.841 8.841 0 01-4.083-.98L2 17l1.338-3.123C2.493 12.767 2 11.434 2 10c0-3.866 3.582-7 8-7s8 3.134 8 7zM7 9H5v2h2V9zm8 0h-2v2h2V9zM9 9h2v2H9V9z" clip-rule="evenodd" />
                </svg>
                <span th:text="${post.comments != null ? #lists.size(post.comments) : 0}">0</span>
            </button>

        </div>

        <!-- Collapsible Comment Section -->
        <div th:id="'comment-section-' + ${post.id}" class="hidden pl-14 pt-3 border-t border-gray-100 space-y-3">

            <!-- Existing Comments List -->
            <div th:id="'comment-list-' + ${post.id}" class="space-y-2">
                <div th:if="${post.comments == null or #lists.isEmpty(post.comments)}"
                     class="text-xs text-slate-400 italic">
                    No comments yet. Be the first!
                </div>
                <div th:each="comment : ${post.comments}"
                     th:id="'comment-' + ${comment.id}"
                     class="flex space-x-2">
                    <div class="w-7 h-7 rounded-full bg-[#eaf2fc] border border-[#d0e2f9] flex items-center justify-center font-bold text-pulseBlue shrink-0 text-xs">
                        <span th:text="${comment.user != null} ? ${#strings.substring(comment.user.firstName, 0, 1)} : 'U'">U</span>
                    </div>
                    <div class="bg-gray-50 rounded-lg px-3 py-2 flex-1">
                        <p class="text-xs font-semibold text-slate-700"
                           th:text="${comment.user != null} ? (${comment.user.firstName} + ' ' + ${comment.user.lastName}) : 'User'">User</p>
                        <p class="text-xs text-slate-600 mt-0.5" th:text="${comment.content}">Comment text</p>
                        <p class="text-[10px] text-slate-400 mt-1"
                           th:text="${comment.createdAt != null} ? ${#temporals.format(comment.createdAt, 'dd MMM yyyy, HH:mm')} : ''"></p>
                    </div>
                </div>
            </div>

            <!-- Add Comment Form -->
            <form th:action="@{/comments/add/{id}(id=${post.id})}" method="post"
                  class="flex space-x-2 pt-1">
                <input type="text"
                       name="content"
                       placeholder="Write a comment..."
                       required
                       maxlength="500"
                       class="flex-1 text-xs bg-gray-50 border border-gray-200 rounded-full px-4 py-2 outline-none focus:border-pulseBlue focus:ring-1 focus:ring-pulseBlue transition-colors" />
                <button type="submit"
                        class="text-xs font-semibold bg-pulseBlue text-white px-4 py-2 rounded-full hover:bg-blue-600 transition-colors">
                    Post
                </button>
            </form>

        </div>

    </div>
</div>
