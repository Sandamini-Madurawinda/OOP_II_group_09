<div xmlns:th="http://www.thymeleaf.org">
    <div th:fragment="post-card(post)" th:id="'post-card-' + ${post.id}" class="bg-white rounded-xl shadow-sm p-4 border border-gray-200 space-y-3">

        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-9 h-9 rounded-full bg-gray-300 flex items-center justify-center text-sm font-semibold text-gray-700">
                    <span th:text="${#strings.substring(post.authorFirstName,0,1)}">A</span>
                </div>
                <div>
                    <h3 class="text-sm font-semibold text-gray-900" th:text="${post.authorFirstName + ' ' + post.authorLastName}">John Doe</h3>
                    <p class="text-xs text-gray-400" th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy, HH:mm')}">Just now</p>
                </div>
            </div>
        </div>

        <div class="text-sm text-gray-800 leading-relaxed break-words" th:text="${post.content}">
            Fallback placeholder content string.
        </div>

        <hr class="border-gray-100">

        <div class="flex items-center space-x-6 text-gray-500 text-sm">
            <button
                    type="button"
                    th:onclick="'toggleLike(' + ${post.id} + ')'"
                    th:id="'like-btn-' + ${post.id}"
                    class="flex items-center space-x-2 focus:outline-none transition group"
                    th:classappend="${post.isLikedByCurrentUser} ? 'text-blue-600 font-medium' : 'hover:text-blue-600'">

                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 fill-current transition group-hover:scale-110" viewBox="0 0 20 20">
                    <path d="M2 10.5a1.5 1.5 0 113 0v6a1.5 1.5 0 01-3 0v-6zM6 10.333v5.43a2 2 0 001.106 1.79l.05.025A4 4 0 008.943 18h5.416a2 2 0 001.106-1.79l1.2-6A2 2 0 0015.56 8H12V4a2 2 0 00-2-2 1 1 0 00-1 1v.667a4 4 0 01-.8 2.4L6.4 10.333z" />
                </svg>

                <span th:id="'like-count-' + ${post.id}" th:text="${post.likeCount}">0</span>
            </button>
        </div>
    </div>
</div>
