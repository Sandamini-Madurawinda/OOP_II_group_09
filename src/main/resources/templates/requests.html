<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:replace="~{layout :: layout(~{::content})}">
<head>
    <title>Friend Requests</title>
</head>

<body>
<th:block th:fragment="content">

    <main class="requests-page">

        <h2 class="page-title">
            Friend Requests
        </h2>

        <div id="requests" class="requests-list"></div>

    </main>

    <script th:src="@{/js/friends.js}"></script>
    <script>

        const userId = 1;

        fetch(`/friends/requests?userId=${userId}`)
        .then(res => res.json())
        .then(requests => {

            let html = '';

            requests.forEach(req => {

                html += `
                <div class="request-card">

                    <span class="request-name">
                        ${req.sender.firstName} ${req.sender.lastName}
                    </span>

                    <div class="request-actions">

                        <button class="accept" data-id="${req.id}">
                            Accept
                        </button>

                        <button class="reject" data-id="${req.id}">
                            Reject
                        </button>

                    </div>

                </div>`;
            });

            document.getElementById('requests').innerHTML = html;

            initializeAcceptRejectButtons();
        });

    </script>

</th:block>
</body>
</html>
